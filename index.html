<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="referrer" content="no-referrer">
<!-- 防搜尋引擎收錄 -->
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex,nocache">
<meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet">
<meta name="bingbot" content="noindex,nofollow,noarchive,nosnippet">
<!-- 防 AI 爬蟲訓練 -->
<meta name="GPTBot" content="noindex,nofollow">
<meta name="ChatGPT-User" content="noindex,nofollow">
<meta name="OAI-SearchBot" content="noindex,nofollow">
<meta name="ClaudeBot" content="noindex,nofollow">
<meta name="anthropic-ai" content="noindex,nofollow">
<meta name="CCBot" content="noindex,nofollow">
<meta name="PerplexityBot" content="noindex,nofollow">
<meta name="Bytespider" content="noindex,nofollow">
<title>默書平台</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{margin:0;padding:0;background:#fff}
body{font-family:'PingFang TC','PingFang SC','Microsoft JhengHei','Noto Sans CJK',sans-serif;color:#333}
#app{width:100%;max-width:900px;background:linear-gradient(180deg,#f4f2ff 0%,#fff 28px,#fff 100%);border-bottom:1px solid #e0dcec;padding:24px 20px 40px;margin:0 auto;position:relative;min-height:100vh}
.screen{display:none}.screen.active{display:block}
h1{font-size:2.2em;text-align:center;margin-bottom:12px;color:#2d3748;font-weight:700}
h2{font-size:1.2em;text-align:center;color:#666;margin-bottom:16px;font-weight:400}

/* Buttons */
.btn{padding:10px 24px;border:none;border-radius:50px;font-size:1em;cursor:pointer;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;touch-action:manipulation;text-decoration:none}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.15)}
.btn:active{transform:translateY(0)}
.btn-primary{background:#667eea;color:#fff}
.btn-success{background:#2ecc71;color:#fff}
.btn-danger{background:#e74c3c;color:#fff}
.btn-warning{background:#f39c12;color:#fff}
.btn-outline{background:#fff;color:#667eea;border:2px solid #667eea}
.btn-sm{padding:6px 16px;font-size:.85em}
.btn-lg{padding:14px 36px;font-size:1.1em}
.btn-block{width:100%}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:16px 0}

/* Language toggle */
.lang-toggle{display:flex;justify-content:center;gap:0;margin:10px auto 24px;background:#f0f0f5;border-radius:50px;padding:4px;max-width:420px;flex-wrap:wrap}
.lang-opt{padding:8px 18px;border-radius:50px;cursor:pointer;font-weight:600;transition:all .2s;font-size:.88em;border:none;background:transparent;white-space:nowrap;color:#555}
@media(max-width:480px){.lang-opt{padding:6px 12px;font-size:.8em}}
.lang-opt.active{background:#667eea;color:#fff;box-shadow:0 2px 8px rgba(102,126,234,.4)}

/* Setup Card Elements */
.cloud-db-card{background:#f8f9fe;border:2px solid #e2e8f0;border-radius:18px;padding:20px;margin:14px 0 24px;box-shadow:0 4px 16px rgba(102,126,234,.05);transition:all .2s}
.cloud-db-card:hover{border-color:#cbd5e0}
.form-select{width:100%;padding:11px 14px;border:2px solid #cbd5e0;border-radius:12px;font-size:.95em;font-family:inherit;color:#2d3748;background-color:#fff;outline:none;cursor:pointer;transition:border-color .2s,box-shadow .2s}
.form-select:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.15)}
.form-select:disabled{background-color:#edf2f7;color:#a0aec0;cursor:not-allowed;border-color:#e2e8f0}

textarea{width:100%;padding:14px 16px;border:2px solid #cbd5e0;border-radius:14px;font-size:1.05em;outline:none;transition:border .2s,box-shadow .2s;font-family:inherit;height:160px;resize:vertical;margin-bottom:18px;line-height:1.6;color:#2d3748}
textarea:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.12)}

/* Dictation header */
.dictation-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.dictation-header .dict-progress{font-size:1em;color:#4a5568;font-weight:700}
.dictation-timer{font-size:1.15em;font-weight:700;color:#e74c3c;background:#fff5f5;padding:4px 14px;border-radius:50px;border:1px solid #fed7d7}

/* Flip card */
.flip-card-wrap{perspective:1000px;margin:12px 0;min-height:480px}
.flip-card{position:relative;width:100%;min-height:480px;transition:transform .5s ease;transform-style:preserve-3d}
.flip-card.flipped{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;top:0;left:0;width:100%;min-height:480px;backface-visibility:hidden;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px}
.flip-front{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;z-index:2;box-shadow:0 10px 25px rgba(102,126,234,.25)}
.flip-front .big-char{font-size:3.4em;font-weight:700;text-shadow:0 4px 12px rgba(0,0,0,.2);letter-spacing:2px}
.flip-front .flip-hint{font-size:.95em;margin-top:8px;opacity:.9}
.flip-front .flip-ready{position:static;margin-top:16px;background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.45);font-weight:600;padding:8px 24px}
.flip-front .flip-ready:hover{background:rgba(255,255,255,.3)}
.flip-back{background:#f8f9fe;transform:rotateY(180deg);padding:14px;border:2px solid #e2e8f0}
.flip-back .canvas-grid{margin:0;padding:8px;border-radius:12px;gap:8px}
@media(max-width:600px){
  .flip-card-wrap{min-height:380px}
  .flip-card{min-height:380px}
  .flip-front,.flip-back{min-height:380px;padding:12px}
}

/* Canvas grid */
.canvas-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin:8px 0;padding:16px;background:#f8f9fe;border-radius:14px;min-height:200px}
.tianzige-wrap{position:relative;display:inline-block}
.tianzige-canvas{border-radius:10px;cursor:crosshair;touch-action:none;display:block;box-shadow:0 3px 10px rgba(0,0,0,.08);background:#fff}
.tianzige-wrap .tianzige-canvas{
  width: var(--dynamic-box-size, 160px) !important;
  height: var(--dynamic-box-size, 160px) !important;
  transition: width 0.2s, height 0.2s;
}
.tianzige-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none}
.tianzige-overlay .correct-char{font-size:3em;font-weight:700;color:rgba(231,76,76,.35);text-shadow:0 0 4px rgba(231,76,76,.1);cursor:pointer;pointer-events:auto}

/* Controls */
.dict-controls{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:14px 0}
.dict-controls .btn{justify-content:center;font-size:.88em;padding:8px 18px;min-width:68px}

/* Results */
.result-item{display:flex;align-items:center;padding:12px 16px;margin:8px 0;border-radius:14px;gap:12px;background:#f8f9fe;border:1px solid #e2e8f0}
.result-icon{font-size:1.2em;width:32px;text-align:center;font-weight:700;color:#667eea}
.result-text{flex:1;font-size:1.1em;font-weight:600;color:#2d3748}
.result-score{text-align:center;margin:24px 0;padding:28px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:20px;color:#fff;box-shadow:0 10px 30px rgba(102,126,234,.3)}
.result-score .score-num{font-size:3.4em;font-weight:700}
.result-score .score-label{font-size:1.1em;opacity:.95;margin-top:6px}
.result-controls{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin:24px 0}
.results-detail{margin:18px 0;max-height:500px;overflow-y:auto;padding-right:4px}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:22px;padding:30px;max-width:520px;width:92%;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,.25);max-height:85vh;overflow-y:auto}
.modal h3{margin-bottom:12px;color:#1a202c;font-size:1.4em;font-weight:700}
.modal p{color:#4a5568;line-height:1.6;font-size:1em}
.modal .btn-group{margin-top:22px}

/* Timer animation */
.timer-critical{animation:pulse .7s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.98)}}

/* Dict modal */
.dict-modal{max-width:400px;text-align:left}
.dict-header{display:flex;align-items:center;gap:18px;margin-bottom:18px}
.dict-char{font-size:3.8em;font-weight:700;color:#2d3748;line-height:1}
.dict-pron{font-size:1.05em;color:#4a5568}
.dict-pron div{margin:4px 0}
.dict-pron .label{color:#718096;font-size:.85em;margin-right:8px;font-weight:700}
.dict-info{display:flex;gap:16px;margin:14px 0;padding:14px 0;border-top:1px solid #edf2f7;border-bottom:1px solid #edf2f7}
.dict-info-item{text-align:center;flex:1}
.dict-info-item .val{font-size:1.4em;font-weight:700;color:#2d3748}
.dict-info-item .lbl{font-size:.82em;color:#718096;margin-top:4px}
.dict-modal-close{float:right;border:none;background:none;cursor:pointer;font-size:1.3em;color:#a0aec0;padding:4px;transition:color .15s}
.dict-modal-close:hover{color:#4a5568}

/* Responsive */
@media(max-width:600px){
  #app{padding:16px;border-radius:0;margin:0}
  h1{font-size:1.8em}
  .result-score .score-num{font-size:2.8em}
  .list-header-row{flex-direction:column;align-items:flex-start!important;gap:10px}
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:3px}
</style>
</head>
<body>
<div id="app">

<!-- ===== SETUP SCREEN ===== -->
<div id="screen-setup" class="screen active">
  <h1 data-t="默書平台">默書平台</h1>

  <div class="lang-toggle" id="langToggle">
    <button class="lang-opt active" data-lang="zh-HK" onclick="setLanguage('zh-HK')">粵語（繁體）</button>
    <button class="lang-opt" data-lang="zh-CN-T" onclick="setLanguage('zh-CN-T')">普通話（繁體）</button>
    <button class="lang-opt" data-lang="zh-CN" onclick="setLanguage('zh-CN')">普通話（簡體）</button>
  </div>

  <!-- ===== 學校默書範圍連動區 ===== -->
  <div class="cloud-db-card">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;border-bottom:1px solid #e2e8f0;padding-bottom:14px">
      <div style="font-weight:700;color:#2d3748;font-size:1.1em" data-t="學校默書範圍">
        學校默書範圍
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span id="sheetStatusBadge" style="font-size:.85em;padding:5px 14px;border-radius:50px;background:#edf2f7;color:#4a5568;font-weight:600">連線中...</span>
        <button class="btn btn-outline btn-sm" onclick="showConfigPrompt()" style="padding:6px 14px;font-size:.85em;border-width:1.5px" data-t="設定試算表 ID">設定試算表 ID</button>
      </div>
    </div>

    <div id="sheetErrorMessage" style="display:none;background:#fff5f5;border:1.5px solid #feb2b2;color:#9b2c2c;border-radius:12px;padding:14px;font-size:.9em;line-height:1.6;margin-bottom:16px"></div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:16px">
      <div>
        <label for="gradeSelect" style="display:block;font-size:.9em;font-weight:700;color:#4a5568;margin-bottom:8px" data-t="選擇年級">選擇年級</label>
        <select id="gradeSelect" class="form-select" onchange="onGradeSelected()" disabled>
          <option value="">讀取年級中...</option>
        </select>
      </div>
      <div>
        <label for="chapterSelect" style="display:block;font-size:.9em;font-weight:700;color:#4a5568;margin-bottom:8px" data-t="選擇章節">選擇章節</label>
        <select id="chapterSelect" class="form-select" onchange="onChapterSelected()" disabled>
          <option value="">請先選擇年級</option>
        </select>
      </div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:.88em;color:#4a5568;background:#edf2f7;padding:10px 16px;border-radius:12px">
      <span id="loadedWordsInfo" style="font-weight:600">準備載入詞語...</span>
      <button onclick="discoverAndLoadSheet(currentSpreadsheetId)" style="background:none;border:none;color:#667eea;font-weight:700;cursor:pointer;padding:0;font-size:1em" data-t="重新整理">重新整理</button>
    </div>
  </div>

  <!-- ===== 默書清單與隨機排序按鈕區 ===== -->
  <div class="list-header-row" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:12px">
    <span style="font-size:.95em;color:#4a5568;font-weight:700" data-t="默書清單（每行一個詞語或句子，也可用逗號分隔）">默書清單（每行一個詞語或句子，也可用逗號分隔）</span>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn btn-sm" id="shuffleToggle" onclick="toggleShuffle()" style="background:transparent;border:2px solid #cbd5e0;color:#4a5568;border-radius:50px;padding:6px 18px;font-size:.88em;cursor:pointer;transition:all .2s;font-weight:700;opacity:.45">
        隨機排序
      </button>
      <button class="btn btn-sm" onclick="saveCustomListPrompt()" style="background:transparent;border:2px solid #cbd5e0;color:#4a5568;border-radius:50px;padding:6px 18px;font-size:.88em;cursor:pointer;transition:all .2s;font-weight:700" data-t="儲存清單">
        儲存清單
      </button>
    </div>
  </div>

  <textarea id="wordInput" placeholder="例如：早上&#10;中午&#10;晚上&#10;太陽&#10;學校&#10;老師" rows="6"></textarea>

  <button class="btn btn-primary btn-lg btn-block" onclick="startDictation()" id="startBtn" style="padding:16px;font-size:1.15em;margin-top:6px" data-t="開始測驗">開始測驗</button>
</div>

<!-- ===== DICTATION SCREEN ===== -->
<div id="screen-dictation" class="screen">
  <div class="dictation-header" style="display:flex; justify-content:space-between; align-items:center; width:100%; margin-bottom:14px">
    <div style="flex:1; display:flex; justify-content:flex-start">
      <button class="btn btn-outline btn-sm" onclick="endDictation()" data-t="結束">結束</button>
    </div>
    <div style="display:flex; align-items:center; gap:16px; background:#f0f2fd; padding:6px 16px; border-radius:50px; border:1px solid #e2e8f0; box-shadow:0 2px 8px rgba(0,0,0,0.04)">
      <button class="btn btn-outline btn-sm" id="dictPrevBtn" onclick="prevVocab()" style="padding:4px; min-width:32px; height:32px; border-radius:50%; font-weight:bold; font-size:1.1em; display:flex; align-items:center; justify-content:center; border-color:#667eea; color:#667eea; background:#fff" title="上一個詞語">&larr;</button>
      <span class="dict-progress" id="dictProgress" style="font-size:1.05em; color:#4a5568; font-weight:700; user-select:none; min-width:60px; text-align:center">1 / 10</span>
      <button class="btn btn-outline btn-sm" id="dictNextVocabBtn" onclick="nextVocab()" style="padding:4px; min-width:32px; height:32px; border-radius:50%; font-weight:bold; font-size:1.1em; display:flex; align-items:center; justify-content:center; border-color:#667eea; color:#667eea; background:#fff" title="下一個詞語">&rarr;</button>
    </div>
    <div style="flex:1; display:flex; justify-content:flex-end">
      <button class="btn btn-outline btn-sm" onclick="showResults()" data-t="結果">結果</button>
    </div>
  </div>

  <div class="flip-card-wrap">
    <div class="flip-card" id="flipCard">
      <div class="flip-front">
        <div class="big-char" id="flipFrontChar"></div>
        <div class="flip-hint" id="flipFrontHint"></div>
        <button class="btn btn-sm btn-outline flip-ready" onclick="flipCard()" data-t="準備好了">準備好了</button>
      </div>
      <div class="flip-back">
        <div class="canvas-grid" id="flipCanvasGrid"></div>
        <div class="dict-controls">
          <button class="btn btn-outline btn-sm" onclick="speakCurrent(); handleButtonClick(this);" title="朗讀" style="padding: 4px;">
            <svg style="pointer-events: none" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.57 8.43a5 5 0 0 1 0 7.07"></path></svg>
          </button>
          <button class="btn btn-outline btn-sm" onclick="clearAllCanvas(); handleButtonClick(this);" title="清空" style="padding: 4px;">
            <svg style="pointer-events: none" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          </button>
          <button class="btn btn-outline btn-sm" onclick="undoLastStroke(); handleButtonClick(this);" title="復原" style="padding: 4px;">
            <svg style="pointer-events: none" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>
          </button>
          <div style="position:relative; display:inline-block">
            <button class="btn btn-outline btn-sm" onclick="toggleEraser(); handleButtonClick(this);" title="橡皮擦" id="eraserBtn" style="padding: 4px;">
              <svg style="pointer-events: none" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
            </button>
            <div id="eraserMenu" style="display:none; position:absolute; bottom:100%; left:0; z-index:10; background:white; border:1px solid #cbd5e0; border-radius:8px; padding:8px; box-shadow:0 4px 6px rgba(0,0,0,0.1); white-space:nowrap;">
              <div onclick="handleEraserSizeSelection(8, this)" style="width:16px; height:16px; border-radius:50%; background:#4a5568; display:inline-block; cursor:pointer; margin:4px; transition: transform 0.1s;"></div>
              <div onclick="handleEraserSizeSelection(24, this)" style="width:24px; height:24px; border-radius:50%; background:#4a5568; display:inline-block; cursor:pointer; margin:4px; transition: transform 0.1s;"></div>
            </div>
          </div>
        </div>
        <div style="text-align:center;margin-top:12px">
          <button class="btn btn-primary btn-lg" onclick="nextItem()" id="dictNextBtn" style="padding:12px 40px" data-t="提交">提交</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== RESULTS SCREEN ===== -->
<div id="screen-results" class="screen">
  <h1 style="margin-top:16px" data-t="結果">結果</h1>
  <div class="result-score">
    <div class="score-num" id="resultScoreNum">0 項</div>
    <div class="score-label" id="resultScoreLabel">測驗完成</div>
  </div>
  <div id="resultDetail" class="results-detail"></div>
  <div class="result-controls">
    <button class="btn btn-primary btn-lg" onclick="goSetup()" style="padding:14px 36px" data-t="回到首頁">回到首頁</button>
  </div>
</div>

<!-- ===== MODALS ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <h3 id="modalTitle">提示</h3>
    <p id="modalMsg" style="margin:14px 0;color:#4a5568"></p>
    <input id="modalInput" style="display:none;width:100%;padding:12px 16px;border:2px solid #cbd5e0;border-radius:12px;font-size:1em;outline:none;font-family:inherit;margin-bottom:16px;color:#2d3748">
    <div class="btn-group" id="modalActions">
      <button class="btn btn-primary" id="modalOkBtn" onclick="closeModal()">確定</button>
    </div>
    <div class="btn-group" id="modalConfirmActions" style="display:none"></div>
  </div>
</div>

<div class="modal-overlay" id="dictModalOverlay">
  <div class="modal dict-modal">
    <button class="dict-modal-close" onclick="closeDictModal()">✕</button>
    <div id="dictModalContent"></div>
  </div>
</div>

</div>

<script>
// ====== CONFIG ======
const CANVAS_SIZE = 300;

function parseGvizResponse(rawText) {
  if (!rawText) return null;
  const startIdx = rawText.indexOf('{');
  const endIdx = rawText.lastIndexOf('}');
  if (startIdx === -1 || endIdx === -1) return null;
  try {
    const jsonStr = rawText.substring(startIdx, endIdx + 1);
    const data = JSON.parse(jsonStr);
    if (data && data.status === 'ok' && data.table) {
      return data.table;
    }
  } catch(e) {}
  return null;
}

function parseTableStructure(table) {
  if (!table) return { chapters: [], wordsByChapter: {} };

  const allRows = [];
  
  if (table.cols && table.cols.length > 0) {
    const colLabels = table.cols.map(c => (c && c.label != null) ? String(c.label).trim() : '');
    const validColLabels = colLabels.filter(l => l && !/^[A-Z]+$/.test(l) && l !== 'id' && l !== '題號' && l !== '题号');
    if (validColLabels.length > 0) {
      allRows.push(colLabels);
    }
  }

  (table.rows || []).forEach(row => {
    if (!row || !row.c) return;
    const vals = row.c.map(cell => {
      if (!cell) return '';
      let v = (cell.v != null) ? cell.v : cell.f;
      return v != null ? String(v).trim() : '';
    });
    allRows.push(vals);
  });

  if (allRows.length === 0) return { chapters: [], wordsByChapter: {} };

  // 格式 B：直行列表式（帶有「章節/範圍」欄與「詞語/句子」欄）
  for (let r = 0; r < Math.min(allRows.length, 6); r++) {
    const row = allRows[r];
    const chCol = row.findIndex(val => /章節|章|單元|範圍|課次|Unit|Chapter|課|週次|Week/i.test(val));
    const wdCol = row.findIndex(val => /詞語|詞句|句子|默書內容|內容|詞|生字|Words|Text/i.test(val));
    
    if (chCol !== -1 && wdCol !== -1 && chCol !== wdCol) {
      const dataRows = allRows.slice(r + 1);
      const chaptersMap = {};
      const chaptersList = [];

      dataRows.forEach(dRow => {
        const w = dRow[wdCol];
        if (!w || /^\d+$/.test(w)) return;
        const cName = dRow[chCol] || '預設範圍';
        if (!chaptersMap[cName]) {
          chaptersMap[cName] = [];
          chaptersList.push(cName);
        }
        chaptersMap[cName].push(w);
      });

      return { chapters: chaptersList, wordsByChapter: chaptersMap };
    }
  }

  // 格式 A：橫向矩陣式（各直行欄位代表不同章節範圍）
  let bestHeaderRowIdx = -1;
  let maxColsCount = 0;

  for (let r = 0; r < Math.min(allRows.length, 6); r++) {
    const row = allRows[r];
    const validCols = row.slice(1).filter(val => val && val !== '題號' && val !== '题号' && !/^[A-Z]+$/.test(val));
    if (validCols.length > maxColsCount) {
      maxColsCount = validCols.length;
      bestHeaderRowIdx = r;
    }
  }

  if (bestHeaderRowIdx === -1 || maxColsCount === 0) {
    for (let r = 0; r < Math.min(allRows.length, 4); r++) {
      const row = allRows[r];
      const nonEmpty = row.filter(Boolean);
      if (nonEmpty.length > 1 && !/^\d+$/.test(nonEmpty[1])) {
        bestHeaderRowIdx = r;
        break;
      }
    }
  }

  if (bestHeaderRowIdx === -1) return { chapters: [], wordsByChapter: {} };

  const headerRow = allRows[bestHeaderRowIdx];
  const dataRows = allRows.slice(bestHeaderRowIdx + 1);

  const chapters = [];
  const wordsByChapter = {};

  headerRow.forEach((header, colIdx) => {
    if (colIdx === 0 && (/題號|题号|編號|Index|ID/i.test(header) || /^\d+$/.test(header))) return;
    if (!header || header === '題號' || header === '题号' || /^[A-Z]+$/.test(header)) return;

    let chName = header;
    if (wordsByChapter[chName]) {
      chName = `${header} (${colIdx})`;
    }

    chapters.push(chName);
    wordsByChapter[chName] = [];

    dataRows.forEach(dRow => {
      const val = dRow[colIdx];
      if (val && !/^\d+$/.test(val) && val !== header) {
        wordsByChapter[chName].push(val);
      }
    });
  });

  const validChapters = chapters.filter(ch => (wordsByChapter[ch] || []).length > 0);
  return { chapters: validChapters, wordsByChapter };
}

async function discoverAndLoadSheet(sheetId) {
  currentSpreadsheetId = sheetId;
  loadedSheetsData = {};

  const gradeSelect = document.getElementById('gradeSelect');
  const chapterSelect = document.getElementById('chapterSelect');
  const badge = document.getElementById('sheetStatusBadge');
  const errBox = document.getElementById('sheetErrorMessage');
  
  if (badge) { badge.textContent = _('連線試算表...'); badge.style.background = '#e8f0fe'; badge.style.color = '#667eea'; }
  if (errBox) { errBox.style.display = 'none'; }
  if (gradeSelect) { gradeSelect.innerHTML = `<option value="">${_('讀取年級中...')}</option>`; gradeSelect.disabled = true; }
  if (chapterSelect) { chapterSelect.innerHTML = `<option value="">${_('請先選擇年級')}</option>`; chapterSelect.disabled = true; }

  const pGrades = ['P.1', 'P.2', 'P.3', 'P.4', 'P.5', 'P.6'];

  const probePromises = pGrades.map(async (stdGradeName) => {
    const candidates = GRADE_TAB_CANDIDATES[stdGradeName] || [stdGradeName];
    for (const tabName of candidates) {
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tabName)}`;
      try {
        const res = await fetch(url);
        if (res.ok) {
          const text = await res.text();
          const table = parseGvizResponse(text);
          if (table && ((table.cols && table.cols.length > 0) || (table.rows && table.rows.length > 0))) {
            const parsed = parseTableStructure(table);
            if (parsed && parsed.chapters && parsed.chapters.length > 0) {
              return { stdGradeName, parsed };
            }
          }
        }
      } catch(e) {}
    }
    return null;
  });

  const results = await Promise.all(probePromises);
  let anyFetched = false;

  results.forEach(item => {
    if (item && item.parsed) {
      anyFetched = true;
      loadedSheetsData[item.stdGradeName] = item.parsed;
    }
  });

  // 嘗試讀取預設第一頁（不傳入 sheet 參數），防止使用者未將分頁命名為 P.1 等
  if (!anyFetched) {
    try {
      const defaultUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
      const res = await fetch(defaultUrl);
      if (res.ok) {
        const text = await res.text();
        const table = parseGvizResponse(text);
        if (table) {
          const parsed = parseTableStructure(table);
          if (parsed && parsed.chapters && parsed.chapters.length > 0) {
            anyFetched = true;
            loadedSheetsData['P.1'] = parsed;
          }
        }
      }
    } catch(e) {}
  }

  if (!anyFetched) {
    if (badge) { badge.textContent = _('示範題庫模式'); badge.style.background = '#fef3c7'; badge.style.color = '#d97706'; }
    if (errBox) {
      errBox.style.display = 'block';
      errBox.innerHTML = `<b>${_('無法讀取雲端試算表')} (ID: <code>${escHtml(sheetId)}</code>)</b><br>` +
        `${_('原因：試算表未公開存取權限、分頁標籤名稱不符合（建議命名為 P.1 至 P.6），或網路受限。')}<br>` +
        `${_('解法：請於 Google 試算表點選「共用」並將權限設為「知道連結的任何人均可查看」。')}<br>` +
        `<hr style="margin:8px 0;border:none;border-top:1px dashed #feb2b2">` +
        `<b>${_('系統已自動啟用「示範題庫」')}</b>${_('，供您立即體驗各年級章節連動及測驗功能。')}`;
    }
    loadSampleMockDatabase();
  } else {
    if (badge) { badge.textContent = _('雲端連線成功'); badge.style.background = '#d1fae5'; badge.style.color = '#065f46'; }
  }

  renderGradeSelect();
  const availableGrades = REQUIRED_GRADES.filter(g => g === '自訂列表' || (loadedSheetsData[g] && loadedSheetsData[g].chapters && loadedSheetsData[g].chapters.length > 0));
  gradeSelect.value = (availableGrades.length > 0 && availableGrades[0] !== '自訂列表') ? availableGrades[0] : 'P.1';
  onGradeSelected();
}

function renderGradeSelect() {
  const gradeSelect = document.getElementById('gradeSelect');
  if (!gradeSelect) return;
  gradeSelect.innerHTML = REQUIRED_GRADES.map(tab => {
    const label = convertText(tab);
    return `<option value="${escHtml(tab)}">${escHtml(label)}</option>`;
  }).join('');
  gradeSelect.disabled = false;
}

function getCustomLists() {
  try { return JSON.parse(localStorage.getItem('zhDictCustomLists') || '[]'); } catch(e) { return []; }
}

function saveCustomListsToStorage(lists) {
  try { localStorage.setItem('zhDictCustomLists', JSON.stringify(lists)); } catch(e) {}
}

function saveCustomListPrompt() {
  const text = document.getElementById('wordInput').value.trim();
  if (!text) { showModal(_('清單為空'), _('請先輸入詞語或句子再點選儲存。')); return; }
  const lines = text.split('\n').map(s => convertText(s.trim())).filter(Boolean);
  if (lines.length === 0) { showModal(_('清單為空'), _('請先輸入詞語或句子再點選儲存。')); return; }

  showPromptModal(_('請輸入自訂清單名稱：'), '', (name) => {
    if (!name || !name.trim()) return;
    const lists = getCustomLists();
    lists.unshift({ name: name.trim(), items: lines, savedAt: Date.now() });
    saveCustomListsToStorage(lists);

    const curGrade = document.getElementById('gradeSelect').value;
    if (curGrade === '自訂列表') {
      onGradeSelected();
    } else {
      showModal(_('儲存成功'), `已成功儲存清單「${name.trim()}」。您隨時可於年級選單切換至「自訂列表」載入。`);
    }
  });
}

function deleteCustomList(idx) {
  showConfirmModal(_('確定要刪除此自訂清單？'), () => {
    const lists = getCustomLists();
    lists.splice(idx, 1);
    saveCustomListsToStorage(lists);
    onGradeSelected();
  });
}

function onGradeSelected() {
  const gradeSelect = document.getElementById('gradeSelect');
  const chapterSelect = document.getElementById('chapterSelect');
  const infoEl = document.getElementById('loadedWordsInfo');
  
  if (!gradeSelect || !chapterSelect) return;
  const grade = gradeSelect.value;

  if (grade === '自訂列表') {
    const lists = getCustomLists();
    if (lists.length === 0) {
      chapterSelect.innerHTML = `<option value="">-- ${_('暫無自訂清單，請於下方輸入並點選儲存')} --</option>`;
      chapterSelect.disabled = true;
      if (infoEl) infoEl.textContent = _('尚無自訂清單');
      document.getElementById('wordInput').value = '';
    } else {
      chapterSelect.innerHTML = lists.map((l, i) => {
        return `<option value="${i}">${escHtml(convertText(l.name))} (${l.items.length} ${_('項')})</option>`;
      }).join('');
      chapterSelect.disabled = false;
      onChapterSelected();
    }
    return;
  }

  const gradeData = loadedSheetsData[grade];
  if (!grade || !gradeData || !gradeData.chapters || gradeData.chapters.length === 0) {
    chapterSelect.innerHTML = `<option value="">-- ${_('雲端試算表未建立此年級範圍')} --</option>`;
    chapterSelect.disabled = true;
    if (infoEl) infoEl.textContent = _('此年級暫無默書範圍');
    document.getElementById('wordInput').value = '';
    return;
  }

  const chapters = gradeData.chapters || [];
  let optionsHtml = chapters.map(chName => {
    const wordList = gradeData.wordsByChapter[chName] || [];
    const chLabel = convertText(chName);
    return `<option value="${escHtml(chName)}">${escHtml(chLabel)} (${wordList.length} ${_('詞')})</option>`;
  }).join('');

  if (chapters.length > 1) {
    const totalWords = chapters.reduce((sum, ch) => sum + (gradeData.wordsByChapter[ch] || []).length, 0);
    optionsHtml = `<option value="__ALL__">${_('全部章節匯總')} (${totalWords} ${_('詞')})</option>` + optionsHtml;
  }

  chapterSelect.innerHTML = optionsHtml;
  chapterSelect.disabled = chapters.length === 0;

  if (chapters.length > 0) {
    chapterSelect.value = chapters[0];
  }
  onChapterSelected();
}

function onChapterSelected() {
  const gradeSelect = document.getElementById('gradeSelect');
  const chapterSelect = document.getElementById('chapterSelect');
  const wordInput = document.getElementById('wordInput');
  const infoEl = document.getElementById('loadedWordsInfo');

  if (!gradeSelect || !chapterSelect || !wordInput) return;
  const grade = gradeSelect.value;
  const ch = chapterSelect.value;

  if (!grade || ch === '') return;

  if (grade === '自訂列表') {
    const lists = getCustomLists();
    const listObj = lists[Number(ch)];
    if (listObj) {
      wordInput.value = listObj.items.map(t => convertText(t)).join('\n');
      if (infoEl) {
        infoEl.innerHTML = `已載入自訂清單 [${escHtml(convertText(listObj.name))}] 共 ${listObj.items.length} 項詞句 ` +
          `<button onclick="deleteCustomList(${Number(ch)})" style="background:none;border:none;color:#e74c3c;text-decoration:underline;cursor:pointer;margin-left:8px;font-weight:700">刪除清單</button>`;
      }
    }
    return;
  }

  const gradeData = loadedSheetsData[grade];
  if (!gradeData) return;

  let words = [];
  let chDisplayName = '';
  if (ch === '__ALL__') {
    (gradeData.chapters || []).forEach(cName => {
      words.push(...(gradeData.wordsByChapter[cName] || []));
    });
    chDisplayName = _('全部章節匯總');
  } else {
    words = gradeData.wordsByChapter[ch] || [];
    chDisplayName = convertText(ch);
  }

  const convertedWords = words.map(w => convertText(w));

    infoEl.textContent = `已載入 [${convertText(grade)} - ${chDisplayName}] 共 ${words.length} 項詞句`;
  }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function isCJK(c) { return c >= '\u4e00' && c <= '\u9fff'; }
const CJK_PUNCT = new Set('。，！？、；：「」『』【】《》—…·・,.:;!?()（）""\'\'');
function stripNonChinese(s) {
  return [...s].filter(c => isCJK(c) || CJK_PUNCT.has(c)).join('');
}
function onlyChinese(s) {
  return [...s].filter(c => isCJK(c) || CJK_PUNCT.has(c)).join('');
}

function startDictation() {
  const text = document.getElementById('wordInput').value.trim();
  if (!text) {
    showModal(_('清單為空'), _('請輸入要默寫的詞語或句子。'));
    return;
  }
  const rawItems = text.split(/[。，！？、；：「」『』【】《》—…·・,.:;!?()（）""\'\'\n\r\t ]+/);
  const items = rawItems.map(s => s.trim()).filter(Boolean);
  if (items.length === 0) {
    showModal(_('清單為空'), _('請輸入要默寫的詞語或句子。'));
    return;
  }

  const mapped = items.map((t, i) => {
    t = stripNonChinese(t);
    return {
      text: t,
      index: i,
    };
  }).filter(it => it.text.length > 0);

  if (state.shuffle) shuffle(mapped);
  state.session = {
    items: mapped,
    currentIndex: 0,
  };

  state.canvasStates = [];
  document.getElementById('flipCard').classList.remove('flipped');
  showScreen('screen-dictation');
  showItem(0);
}

// ====== DICTATION ITEM ======
function showItem(index) {
  const session = state.session;
  if (!session || index >= session.items.length) {
    showResults();
    return;
  }

  const item = session.items[index];
  session.currentIndex = index;
  document.getElementById('dictProgress').textContent = `${index + 1} / ${session.items.length}`;

  const prevBtn = document.getElementById('dictPrevBtn');
  const nextBtn = document.getElementById('dictNextVocabBtn');
  if (prevBtn) prevBtn.disabled = index === 0;
  if (nextBtn) nextBtn.disabled = index === session.items.length - 1;

  document.getElementById('flipCard').classList.remove('flipped');
  document.getElementById('flipFrontChar').textContent = item.text;
  const isLong = item.text.length >= 5;
  document.getElementById('flipFrontHint').textContent = isLong ? _('句子') : _('詞語');

  buildCanvasGrid(item.text, document.getElementById('flipCanvasGrid'), item.canvasStrokes || null);
}

function flipCard() {
  document.getElementById('flipCard').classList.add('flipped');
  const item = state.session.items[state.session.currentIndex];
  if (item) {
    speakCurrent();
  }
}

// ====== TTS ======
let _ttsAudio = null;

function speakCurrent() {
  const session = state.session;
  if (!session || !session.items.length) return;
  const text = session.items[session.currentIndex].text;
  if (!text) return;

  if (_ttsAudio) { try { _ttsAudio.pause(); } catch(e) {} _ttsAudio = null; }

  const mandarin = isMan();
  const tl = mandarin ? 'zh-CN' : 'yue';
  const cleaned = onlyChinese(text);
  if (!cleaned) return;
  const ttsText = mandarin ? toS(cleaned) : cleaned;
  const audio = new Audio();
  audio.referrerPolicy = 'no-referrer';
  audio.src = 'https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=' + tl + '&q=' + encodeURIComponent(ttsText) + '&client=gtx';
  _ttsAudio = audio;
  audio.onended = () => { _ttsAudio = null; };
  audio.play().catch(() => {});
}

// ====== BOX STROKE ORDER HELPER ======
function playBoxStrokeOrder(char, containerEl, size, btnEl = null) {
  if (typeof HanziWriter === 'undefined' || !char) return;

  if (btnEl) {
    btnEl.style.background = '#ebf4ff';
    btnEl.style.borderColor = '#667eea';
    btnEl.style.color = '#667eea';
    btnEl.style.fontWeight = '700';
  }

  const finish = () => {
    containerEl.style.display = 'none';
    containerEl.innerHTML = '';
    if (btnEl) {
      btnEl.style.background = '#fff';
      btnEl.style.borderColor = '#cbd5e0';
      btnEl.style.color = '#4a5568';
      btnEl.style.fontWeight = 'normal';
    }
  };

  containerEl.style.display = 'flex';
  containerEl.style.alignItems = 'center';
  containerEl.style.justifyContent = 'center';
  containerEl.innerHTML = '';

  try {
    const pad = Math.max(4, Math.floor(size * 0.06));
    const writer = HanziWriter.create(containerEl, char, {
      width: size, height: size, padding: pad,
      strokeColor: '#e74c3c', radicalColor: '#c0392b',
      showCharacter: false, strokeAnimationDuration: 380 * state.strokeSpeed,
      delayBetweenStrokes: 110 * state.strokeSpeed,
    });
    setTimeout(() => {
      if (writer && writer.animateCharacter) {
        const p = writer.animateCharacter();
        if (p && p.then) {
          p.then(() => {
            setTimeout(finish, 1200);
          }).catch(finish);
        } else {
          setTimeout(finish, 2000);
        }
      } else {
        finish();
      }
    }, 150);
  } catch(err) {
    finish();
  }
}

// ====== BUILD CANVAS GRID ======
function buildCanvasGrid(text, gridEl, savedStrokes = null) {
  const chars = [...text];
  gridEl.innerHTML = '';
  state.canvasStates = [];

  const count = chars.length;
  const screenW = window.innerWidth || document.documentElement.clientWidth || 380;
  
  // 在手機直向（螢幕較窄）時，如字數超過2個，限制每列最多放2個字；平板及電腦最多4個字
  const maxColsPerRow = screenW < 550 ? 2 : 4;
  const cols = Math.min(maxColsPerRow, count);
  const rows = Math.ceil(count / cols);

  // 根據螢幕可用寬度動態極大化計算每個寫字格的大細，絕對避免重疊
  const availableW = Math.min(screenW - 52, 860);
  const gap = 16;
  const calculatedSize = Math.floor((availableW - (cols - 1) * gap) / cols);

  let boxSize = calculatedSize;
  if (cols === 1) {
    boxSize = Math.min(calculatedSize, screenW < 600 ? 280 : 400);
  } else if (cols === 2) {
    boxSize = Math.min(calculatedSize, screenW < 600 ? 155 : 300);
  } else {
    boxSize = Math.min(calculatedSize, screenW < 600 ? 145 : 220);
  }
  boxSize = Math.max(boxSize, 85); // 最細下限

  gridEl.style.display = 'grid';
  gridEl.style.gridTemplateColumns = `repeat(${cols}, minmax(0, ${boxSize}px))`;
  gridEl.style.justifyContent = 'center';
  gridEl.style.gap = `${gap}px`;
  gridEl.style.maxWidth = '100%';

  // 動態卡片高度設定（加上下方按鈕行高度）
  const wrapEl = document.querySelector('.flip-card-wrap');
  const cardEl = document.getElementById('flipCard');

    const hintBtn = document.createElement('button');

    hintBtn.textContent = '💡 提示';
    hintBtn.title = '顯示香港小學字詞表標準正體提示';

    const strokeWrapper = document.createElement('div');
    strokeWrapper.style.cssText = 'position:relative;display:flex;flex:1';
    
    const strokeBtn = document.createElement('button');
    strokeBtn.type = 'button';
    strokeBtn.className = 'btn btn-outline btn-sm';
    strokeBtn.style.cssText = 'flex:1;padding:4px 2px;font-size:0.78em;border-radius:6px;border-color:#cbd5e0;color:#4a5568;background:#fff;transition:all 0.2s;line-height:1.2;cursor:pointer';
    strokeBtn.textContent = '筆順';
    strokeBtn.title = '根據教育局學習字詞表指引播放筆順';
    
    const speedMenu = document.createElement('div');
    speedMenu.style.cssText = 'display:none;position:absolute;bottom:100%;left:0;z-index:10;background:white;border:1px solid #cbd5e0;border-radius:8px;padding:4px;box-shadow:0 4px 6px rgba(0,0,0,0.1);white-space:nowrap;font-size:0.75em';
    
    [0.5, 1.0, 2.0].forEach(speed => {
        const speedBtn = document.createElement('button');
        speedBtn.className = 'btn btn-sm';
        speedBtn.style.cssText = 'padding:2px 4px;margin:0 2px';
        speedBtn.textContent = speed === 0.5 ? '快' : (speed === 1.0 ? '中' : '慢');
        speedBtn.onclick = (e) => {
            e.stopPropagation();

            speedMenu.style.display = 'none';
            playBoxStrokeOrder(char, hwContainer, boxSize, strokeBtn);

        speedMenu.appendChild(speedBtn);

    strokeWrapper.appendChild(strokeBtn);

    strokeBtn.addEventListener('click', (e) => {
      e.stopPropagation();

    btnBar.appendChild(hintBtn);

    wrap.appendChild(btnBar);
    gridEl.appendChild(wrap);

    const cs = {
      canvas,

      strokes: (savedStrokes && savedStrokes[i]) ? JSON.parse(JSON.stringify(savedStrokes[i])) : [],
      currentStroke: null,
      isDrawing: false,
      char,
      submitted: false,

      hintBtn,

      hintContainer,
    };
    state.canvasStates.push(cs);
    bindCanvasEvents(cs, canvas);
    redrawCanvas(cs);

    hintBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      cs.showHintChar = !cs.showHintChar;
      hintBtn.style.background = cs.showHintChar ? '#ebf4ff' : '#fff';
      hintBtn.style.borderColor = cs.showHintChar ? '#667eea' : '#cbd5e0';

      }
    });
  });
  updateButtonStates();
}

// ====== CANVAS DRAWING ======
function drawTianZiGe(ctx, w, h, clear = true) {
  if (clear) ctx.clearRect(0, 0, w, h);

  ctx.strokeStyle = '#d0d0e0';
  ctx.lineWidth = 3.5;
  ctx.setLineDash([]);
  ctx.strokeRect(4, 4, w - 8, h - 8);

  ctx.setLineDash([8, 8]);
  ctx.beginPath();
  ctx.moveTo(w / 2, 4);
  ctx.lineTo(w / 2, h - 4);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(4, h / 2);
  ctx.lineTo(w - 4, h / 2);
  ctx.stroke();

  ctx.setLineDash([4, 12]);
  ctx.strokeStyle = '#e0e0f0';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(4, 4);
  ctx.lineTo(w - 4, h - 4);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(w - 4, 4);
  ctx.lineTo(4, h - 4);
  ctx.stroke();
  ctx.setLineDash([]);
}

function redrawCanvas(cs) {
  const { ctx, canvas, strokes, hintContainer, showHintChar } = cs;
  const size = canvas.width;
  
  // Create an offscreen canvas for strokes
  const offscreen = document.createElement('canvas');
  offscreen.width = size;
  offscreen.height = size;
  const offctx = offscreen.getContext('2d');
  offctx.lineCap = 'round';
  offctx.lineJoin = 'round';

  // Draw strokes on offscreen canvas
  strokes.forEach(stroke => {
    const { points, isEraser, eraserSize } = stroke;
    if (points.length === 0) return;

    if (isEraser) {
      offctx.globalCompositeOperation = 'destination-out';
      offctx.lineWidth = eraserSize;
    } else {
      offctx.globalCompositeOperation = 'source-over';
      offctx.strokeStyle = '#333';
      offctx.lineWidth = 8;
    }

    if (points.length === 1) {
      offctx.beginPath();
      offctx.arc(points[0].x, points[0].y, offctx.lineWidth / 2, 0, Math.PI * 2);
      if (!isEraser) {
        offctx.fillStyle = offctx.strokeStyle;
        offctx.fill();
      } else {
        offctx.fill();
      }
      return;
    }
    offctx.beginPath();
    offctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length - 1; i++) {
      const xc = (points[i].x + points[i + 1].x) / 2;
      const yc = (points[i].y + points[i + 1].y) / 2;
      offctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
    }
    offctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
    offctx.stroke();
  });
  offctx.globalCompositeOperation = 'source-over'; // Reset

  // Now draw everything on the main canvas
  drawTianZiGe(ctx, size, size, true);

  if (hintContainer) {
    hintContainer.style.visibility = showHintChar ? 'visible' : 'hidden';
  }

  // Draw offscreen canvas onto main canvas
  ctx.drawImage(offscreen, 0, 0);
}

function bindCanvasEvents(cs, canvas) {
  const getPos = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
    const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return { x: x * scaleX, y: y * scaleY };
  };

  const startDraw = (e) => {
    if (cs.submitted || cs.hwContainer.style.display !== 'none') return;
    e.preventDefault();
    const pos = getPos(e);
    cs.isDrawing = true;
    cs.currentStroke = { points: [pos], isEraser: state.isEraser, eraserSize: state.eraserSize };
    cs.strokes.push(cs.currentStroke);
    redrawCanvas(cs);
    updateButtonStates();
  };

  const moveDraw = (e) => {
    if (!cs.isDrawing || cs.submitted || cs.hwContainer.style.display !== 'none') return;
    e.preventDefault();
    const pos = getPos(e);
    cs.currentStroke.points.push(pos);
    redrawCanvas(cs);
  };

  const endDraw = () => {
    if (!cs.isDrawing) return;
    cs.isDrawing = false;
    cs.currentStroke = null;
  };

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', moveDraw);
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('mouseleave', endDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', moveDraw, { passive: false });
  canvas.addEventListener('touchend', endDraw, { passive: false });
}

function clearAllCanvas() {
  state.canvasStates.forEach(cs => {
    cs.strokes = [];
    cs.currentStroke = null;
    cs.submitted = false;
    cs.canvas.style.opacity = '1';
    redrawCanvas(cs);
  });
  updateButtonStates();
}

function updateButtonStates() {
  const buttons = document.querySelectorAll('.dict-controls button');
  
  buttons.forEach(btn => {
    if (btn.id === 'eraserBtn') {
        // Eraser button active style
        if (state.isEraser) {
            btn.style.background = '#ebf4ff';
            btn.style.borderColor = '#667eea';
            btn.style.color = '#667eea';
        } else {
            btn.style.background = '#fff';
            btn.style.borderColor = '#cbd5e0';
            btn.style.color = '#4a5568';
        }
        return;
    }

    // For Speak, Clear, Undo buttons: Always look grey (inactive), but remain enabled.
    btn.style.borderColor = '#cbd5e0';
    btn.style.color = '#a0aec0';
    btn.style.background = '#f7fafc';
    btn.disabled = false; // Always enabled
  });
}

function handleButtonClick(btn) {
    // Brief blue highlight when pressed
    btn.style.borderColor = '#667eea';
    btn.style.color = '#667eea';
    btn.style.background = '#ebf4ff';
    
    setTimeout(() => {
        updateButtonStates(); // Reset to grey style
    }, 200);
}

function undoLastStroke() {
  for (let i = state.canvasStates.length - 1; i >= 0; i--) {
    const cs = state.canvasStates[i];
    if (cs.strokes.length > 0) {
      cs.strokes.pop();
      redrawCanvas(cs);
      updateButtonStates();
      return;
    }
  }
}

// ====== TIMER ======
function startTestTimer(text) {}
function stopTestTimer() {}
function updateTimerDisplay() {}

function saveCurrentCanvasState() {
  const session = state.session;
  if (session && state.canvasStates.length > 0) {
    const item = session.items[session.currentIndex];
    item.canvasImages = state.canvasStates.map(cs => {
      const tmp = document.createElement('canvas');
      tmp.width = cs.canvas.width;
      tmp.height = cs.canvas.height;
      const tctx = tmp.getContext('2d');
      tctx.fillStyle = '#fff';
      tctx.fillRect(0, 0, tmp.width, tmp.height);
      tctx.drawImage(cs.canvas, 0, 0);
      return tmp.toDataURL();
    });
    item.canvasStrokes = state.canvasStates.map(cs => JSON.parse(JSON.stringify(cs.strokes)));
  }
}

function prevVocab() {
  const session = state.session;
  if (!session) return;
  if (session.currentIndex > 0) {
    saveCurrentCanvasState();
    cleanupHW();
    const prevIndex = session.currentIndex - 1;
    showItem(prevIndex);
  }
}

function nextVocab() {
  const session = state.session;
  if (!session) return;
  saveCurrentCanvasState();
  cleanupHW();
  resetEraser();
  resetSpeed();
  const nextIndex = session.currentIndex + 1;
  if (nextIndex >= session.items.length) {
    showResults();
  } else {
    showItem(nextIndex);
  }
}

// ====== NEXT ITEM ======
function nextItem() {
  nextVocab();
}

// ====== STROKE ORDER ======
function showStrokeOrder(el, char, idx) {
  const existing = document.getElementById('hwPopup');
  if (existing) { closeHWPopup(); return; }

  const popup = document.createElement('div');
  popup.id = 'hwPopup';
  popup.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:18px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.25);z-index:2000;text-align:center';

  popup.innerHTML = `<div style="font-size:.95em;color:#4a5568;margin-bottom:12px;font-weight:700">${escHtml(char)} ${_('筆順動畫')}</div>
    <div id="hwCell" style="width:140px;height:140px;margin:0 auto"></div>
    <button class="btn btn-sm btn-outline" onclick="closeHWPopup()" style="margin-top:16px;padding:6px 24px">${_('關閉')}</button>
    <div style="margin-top:12px;font-size:.75em;color:#a0aec0">${_('筆順根據教育局學習字詞表指引')}</div>`;

  document.body.appendChild(popup);

  if (typeof HanziWriter !== 'undefined') {
    try {
      const writer = HanziWriter.create('hwCell', char, {
        width: 140, height: 140, padding: 8,
        strokeColor: '#2d3748', radicalColor: '#e74c3c',
        showCharacter: false, strokeAnimationDuration: 400,
        delayBetweenStrokes: 120,
      });
      if (!window._hwInstances) window._hwInstances = [];
      window._hwInstances[idx] = writer;
      setTimeout(() => writer.animateCharacter().catch(() => {}), 300);
    } catch(e) {
      document.getElementById('hwCell').textContent = char;
    }
  }

  popup.addEventListener('click', e => { if (e.target === popup) closeHWPopup(); });
}

function closeHWPopup() {
  if (window._hwInstances) {
    window._hwInstances.forEach(w => { try { w && w.quit && w.quit(); } catch(e) {} });
    window._hwInstances = [];
  }
  const popup = document.getElementById('hwPopup');
  if (popup) popup.remove();
}

function cleanupHW() {
  closeHWPopup();
}

// ====== RESULTS ======
function showResults() {
  stopTestTimer();
  showScreen('screen-results');

  const session = state.session;
  const total = session.items.length;

  document.getElementById('resultScoreNum').textContent = `${total} ${_('項')}`;
  document.getElementById('resultScoreLabel').textContent = `${_('測驗完成')}`;

  const detail = document.getElementById('resultDetail');
  detail.innerHTML = `<div style="margin-bottom:10px;color:#718096;font-size:.95em;font-weight:700">${_('所有項目總覽：')}</div>` +
    session.items.map((item, i) => {
      const chars = [...item.text];
      const images = item.canvasImages || [];
      let canvasRow = '';
      if (images.length) {
        canvasRow = `<div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(135px, 220px));gap:16px;justify-content:center;margin:16px 0 8px;width:100%">`;
        chars.forEach((ch, j) => {
          const img = images[j];
          if (img) {
            canvasRow += `<div style="text-align:center;display:flex;flex-direction:column;align-items:center">
              <img src="${img}" style="width:100%;aspect-ratio:1/1;max-width:220px;border-radius:12px;border:2px solid #cbd5e0;background:#fff;display:block;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
              <div style="font-size:1.2em;font-weight:700;margin-top:8px;color:#2d3748">${escHtml(ch)}</div>
              <button class="btn btn-outline btn-sm" style="margin-top:6px;font-size:.85em;padding:4px 14px;border-width:1px" onclick="showStrokeOrder(this, '${escHtml(ch)}', ${i*100+j})">${_('筆順')}</button>
            </div>`;
          }
        });
        canvasRow += `</div>`;
      }
      return `<div class="result-item" style="background:#f8f9fe;flex-direction:column;align-items:stretch;padding:14px">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="result-icon">${i + 1}</span>
          <span class="result-text">${escHtml(item.text)}</span>
        </div>
        ${canvasRow}
      </div>`;
    }).join('');

  state.session = null;
}

function goSetup() {
  stopTestTimer();
  state.canvasStates = [];
  showScreen('screen-setup');
}

function endDictation() {
  showConfirmModal(_('確定結束測驗？'), () => {
    stopTestTimer();
    state.session = null;
    state.canvasStates = [];
    goSetup();
  });
}
