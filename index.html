<script>
// ====== CONFIG ======
const CANVAS_SIZE = 160;
const TEST_TIME_PER_CHAR_MS = 15000;
const TEST_MIN_TIME_MS = 30000;

// ====== FIXED GRADES LIST (P.1 - P.6 & иҮӘиЁӮеҲ—иЎЁ) ======
const REQUIRED_GRADES = ['P.1', 'P.2', 'P.3', 'P.4', 'P.5', 'P.6', 'иҮӘиЁӮеҲ—иЎЁ'];

// ====== STATE ======
let currentSpreadsheetId = '1yF-1sSGs08fjTjA4u5zwuwxBjAFzjAYucrjrZOnAxbA';
let loadedSheetsData = {};

const state = {
  lang: 'zh-HK',
  session: null,
  canvasStates: [],
  testTimer: null,
  testTimeLeft: 0,
  shuffle: false,
};

function getSpreadsheetIdFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (id && id.trim()) {
    return id.trim();
  }
  return '1yF-1sSGs08fjTjA4u5zwuwxBjAFzjAYucrjrZOnAxbA';
}

function parseGvizResponse(rawText) {
  if (!rawText) return null;
  const startIdx = rawText.indexOf('{');
  const endIdx = rawText.lastIndexOf('}');
  if (startIdx === -1 || endIdx === -1) return null;
  try {
    const jsonStr = rawText.substring(startIdx, endIdx + 1);
    const data = JSON.parse(jsonStr);
    if (data && data.status === 'ok' && data.table) {
      return data.table;
    }
  } catch(e) {}
  return null;
}

function parseTableStructure(table) {
  if (!table || !table.cols) return { chapters: [], wordsByChapter: {} };

  let colHeaders = [];
  let dataRows = [];

  const colLabels = table.cols.map(c => (c && c.label != null) ? String(c.label).trim() : '');
  const hasValidColLabels = colLabels.some(l => l && l !== 'йЎҢиҷҹ' && l !== 'йўҳеҸ·' && l !== 'Index' && l !== 'id' && l !== 'A' && l !== 'B' && !/^[A-Z]+$/.test(l));

  if (hasValidColLabels) {
    colHeaders = colLabels;
    dataRows = table.rows || [];
  } else if (table.rows && table.rows.length > 0) {
    const firstRow = table.rows[0];
    colHeaders = (firstRow.c || []).map(cell => {
      if (!cell) return '';
      let v = (cell.v != null) ? cell.v : cell.f;
      return v != null ? String(v).trim() : '';
    });
    dataRows = table.rows.slice(1);
  } else {
    colHeaders = colLabels;
    dataRows = [];
  }

  const chapters = [];
  const wordsByChapter = {};

  colHeaders.forEach((header, idx) => {
    if (idx === 0) return; // Skip Column A (йЎҢиҷҹ)
    if (!header || header === 'йЎҢиҷҹ' || header === 'йўҳеҸ·' || header.toLowerCase() === 'index' || /^[A-Z]+$/.test(header)) return;

    let chName = header;
    if (wordsByChapter[chName]) {
      chName = `${header} (${idx})`;
    }

    chapters.push(chName);
    wordsByChapter[chName] = [];

    dataRows.forEach(row => {
      if (!row || !row.c) return;
      const cell = row.c[idx];
      if (cell && (cell.v != null || cell.f != null)) {
        let rawVal = (cell.v != null) ? cell.v : cell.f;
        let val = String(rawVal).trim();
        if (val && !/^\d+$/.test(val)) {
          wordsByChapter[chName].push(val);
        }
      }
    });
  });

  return { chapters, wordsByChapter };
}

async function discoverAndLoadSheet(sheetId) {
  currentSpreadsheetId = sheetId;
  loadedSheetsData = {};

  const gradeSelect = document.getElementById('gradeSelect');
  const chapterSelect = document.getElementById('chapterSelect');
  const badge = document.getElementById('sheetStatusBadge');
  const errBox = document.getElementById('sheetErrorMessage');
  
  if (badge) { badge.textContent = _('йҖЈз·ҡи©Ұз®—иЎЁ...'); badge.style.background = '#e8f0fe'; badge.style.color = '#667eea'; }
  if (errBox) { errBox.style.display = 'none'; }
  if (gradeSelect) { gradeSelect.innerHTML = `<option value="">${_('и®ҖеҸ–е№ҙзҙҡдёӯ...')}</option>`; gradeSelect.disabled = true; }
  if (chapterSelect) { chapterSelect.innerHTML = `<option value="">${_('и«Ӣе…ҲйҒёж“Үе№ҙзҙҡ')}</option>`; chapterSelect.disabled = true; }

  const pGrades = ['P.1', 'P.2', 'P.3', 'P.4', 'P.5', 'P.6'];
  const probePromises = pGrades.map(async (tabName) => {
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tabName)}`;
    try {
      const res = await fetch(url);
      if (res.ok) {
        const text = await res.text();
        const table = parseGvizResponse(text);
        if (table && table.cols && table.cols.length > 0) {
          const parsed = parseTableStructure(table);
          if (parsed.chapters && parsed.chapters.length > 0) {
            return { tabName, parsed };
          }
        }
      }
    } catch (e) {}
    return null;
  });

  const results = await Promise.all(probePromises);
  let anyFetched = false;
  results.forEach(item => {
    if (item && item.parsed) {
      anyFetched = true;
      loadedSheetsData[item.tabName] = item.parsed;
    }
  });

  if (!anyFetched) {
    if (badge) { badge.textContent = _('зӨәзҜ„йЎҢеә«жЁЎејҸ'); badge.style.background = '#fef3c7'; badge.style.color = '#d97706'; }
    if (errBox) {
      errBox.style.display = 'block';
      errBox.innerHTML = `<b>${_('з„Ўжі•и®ҖеҸ–йӣІз«Ҝи©Ұз®—иЎЁ')} (ID: <code>${escHtml(sheetId)}</code>)</b><br>` +
        `${_('еҺҹеӣ пјҡи©Ұз®—иЎЁжңӘе…¬й–ӢеӯҳеҸ–ж¬ҠйҷҗпјҢжҲ–з¶Іи·ҜйҖЈз·ҡеҸ—йҷҗгҖӮ')}<br>` +
        `${_('и§Јжі•пјҡи«Ӣж–ј Google и©Ұз®—иЎЁй»һйҒёгҖҢе…ұз”ЁгҖҚдёҰе°Үж¬ҠйҷҗиЁӯзӮәгҖҢзҹҘйҒ“йҖЈзөҗзҡ„д»»дҪ•дәәеқҮеҸҜжҹҘзңӢгҖҚгҖӮ')}<br>` +
        `<hr style="margin:8px 0;border:none;border-top:1px dashed #feb2b2">` +
        `<b>${_('зі»зөұе·ІиҮӘеӢ•е•ҹз”ЁгҖҢзӨәзҜ„йЎҢеә«гҖҚ')}</b>${_('пјҢдҫӣжӮЁз«ӢеҚій«”й©—еҗ„е№ҙзҙҡз« зҜҖйҖЈеӢ•еҸҠжё¬й©—еҠҹиғҪгҖӮ')}`;
    }
    loadSampleMockDatabase();
  } else {
    loadSampleMockDatabase();
    results.forEach(item => {
      if (item && item.parsed) {
        loadedSheetsData[item.tabName] = item.parsed;
      }
    });
    if (badge) { badge.textContent = _('йӣІз«ҜйҖЈз·ҡжҲҗеҠҹ'); badge.style.background = '#d1fae5'; badge.style.color = '#065f46'; }
  }

  renderGradeSelect();
  gradeSelect.value = 'P.1';
  onGradeSelected();
}

  gradeSelect.innerHTML = REQUIRED_GRADES.map(tab => {
    const label = convertText(tab);
    return `<option value="${escHtml(tab)}">${escHtml(label)}</option>`;
  }).join('');
  gradeSelect.disabled = false;
}

function getCustomLists() {
  try { return JSON.parse(localStorage.getItem('zhDictCustomLists') || '[]'); } catch(e) { return []; }
}

function saveCustomListsToStorage(lists) {
  try { localStorage.setItem('zhDictCustomLists', JSON.stringify(lists)); } catch(e) {}
}

function saveCustomListPrompt() {
  const text = document.getElementById('wordInput').value.trim();
  if (!text) { showModal(_('жё…е–®зӮәз©ә'), _('и«Ӣе…Ҳијёе…Ҙи©һиӘһжҲ–еҸҘеӯҗеҶҚй»һйҒёе„ІеӯҳгҖӮ')); return; }
  const lines = text.split('\n').map(s => convertText(s.trim())).filter(Boolean);
  if (lines.length === 0) { showModal(_('жё…е–®зӮәз©ә'), _('и«Ӣе…Ҳијёе…Ҙи©һиӘһжҲ–еҸҘеӯҗеҶҚй»һйҒёе„ІеӯҳгҖӮ')); return; }

  showPromptModal(_('и«Ӣијёе…ҘиҮӘиЁӮжё…е–®еҗҚзЁұпјҡ'), '', (name) => {
    if (!name || !name.trim()) return;
    const lists = getCustomLists();
    lists.unshift({ name: name.trim(), items: lines, savedAt: Date.now() });
    saveCustomListsToStorage(lists);

    const curGrade = document.getElementById('gradeSelect').value;
    if (curGrade === 'иҮӘиЁӮеҲ—иЎЁ') {
      onGradeSelected();
    } else {
      showModal(_('е„ІеӯҳжҲҗеҠҹ'), `е·ІжҲҗеҠҹе„Іеӯҳжё…е–®гҖҢ${name.trim()}гҖҚгҖӮжӮЁйҡЁжҷӮеҸҜж–је№ҙзҙҡйҒёе–®еҲҮжҸӣиҮігҖҢиҮӘиЁӮеҲ—иЎЁгҖҚијүе…ҘгҖӮ`);
    }
  });
}

function deleteCustomList(idx) {
  showConfirmModal(_('зўәе®ҡиҰҒеҲӘйҷӨжӯӨиҮӘиЁӮжё…е–®пјҹ'), () => {
    const lists = getCustomLists();
    lists.splice(idx, 1);
    saveCustomListsToStorage(lists);
    onGradeSelected();
  });
}

function onGradeSelected() {
  const gradeSelect = document.getElementById('gradeSelect');
  const chapterSelect = document.getElementById('chapterSelect');
  const infoEl = document.getElementById('loadedWordsInfo');
  
  if (!gradeSelect || !chapterSelect) return;
  const grade = gradeSelect.value;

  if (grade === 'иҮӘиЁӮеҲ—иЎЁ') {
    const lists = getCustomLists();
    if (lists.length === 0) {
      chapterSelect.innerHTML = `<option value="">-- ${_('жҡ«з„ЎиҮӘиЁӮжё…е–®пјҢи«Ӣж–јдёӢж–№ијёе…ҘдёҰй»һйҒёе„Іеӯҳ')} --</option>`;
      chapterSelect.disabled = true;
      if (infoEl) infoEl.textContent = _('е°ҡз„ЎиҮӘиЁӮжё…е–®');
      document.getElementById('wordInput').value = '';
    } else {
      chapterSelect.innerHTML = lists.map((l, i) => {
        return `<option value="${i}">${escHtml(convertText(l.name))} (${l.items.length} ${_('й …')})</option>`;
      }).join('');
      chapterSelect.disabled = false;
      onChapterSelected();
    }
    return;
  }

  const gradeData = loadedSheetsData[grade];
  if (!grade || !gradeData) {
    chapterSelect.innerHTML = `<option value="">-- ${_('жӯӨе№ҙзҙҡжҡ«з„Ўз« зҜҖ')} --</option>`;
    chapterSelect.disabled = true;
    if (infoEl) infoEl.textContent = _('е°ҡжңӘијүе…Ҙи©һиӘһ');
    return;
  }

  const chapters = gradeData.chapters || [];
  let optionsHtml = chapters.map(chName => {
    const wordList = gradeData.wordsByChapter[chName] || [];
    const chLabel = convertText(chName);
    return `<option value="${escHtml(chName)}">${escHtml(chLabel)} (${wordList.length} ${_('и©һ')})</option>`;
  }).join('');

  if (chapters.length > 1) {
    const totalWords = chapters.reduce((sum, ch) => sum + (gradeData.wordsByChapter[ch] || []).length, 0);
    optionsHtml = `<option value="__ALL__">${_('е…ЁйғЁз« зҜҖеҢҜзёҪ')} (${totalWords} ${_('и©һ')})</option>` + optionsHtml;
  }

  chapterSelect.innerHTML = optionsHtml;
  chapterSelect.disabled = chapters.length === 0;

  if (chapters.length > 0) {
    chapterSelect.value = chapters[0];
  }
  onChapterSelected();
}

function onChapterSelected() {
  const gradeSelect = document.getElementById('gradeSelect');
  const chapterSelect = document.getElementById('chapterSelect');
  const wordInput = document.getElementById('wordInput');
  const infoEl = document.getElementById('loadedWordsInfo');

  if (!gradeSelect || !chapterSelect || !wordInput) return;
  const grade = gradeSelect.value;
  const ch = chapterSelect.value;

  if (!grade || ch === '') return;

  if (grade === 'иҮӘиЁӮеҲ—иЎЁ') {
    const lists = getCustomLists();
    const listObj = lists[Number(ch)];
    if (listObj) {
      wordInput.value = listObj.items.map(t => convertText(t)).join('\n');
      if (infoEl) {
        infoEl.innerHTML = `е·Іијүе…ҘиҮӘиЁӮжё…е–® [${escHtml(convertText(listObj.name))}] е…ұ ${listObj.items.length} й …и©һеҸҘ ` +
          `<button onclick="deleteCustomList(${Number(ch)})" style="background:none;border:none;color:#e74c3c;text-decoration:underline;cursor:pointer;margin-left:8px;font-weight:700">еҲӘйҷӨжё…е–®</button>`;
      }
    }
    return;
  }

  const gradeData = loadedSheetsData[grade];
  if (!gradeData) return;

  let words = [];
  let chDisplayName = '';
  if (ch === '__ALL__') {
    (gradeData.chapters || []).forEach(cName => {
      words.push(...(gradeData.wordsByChapter[cName] || []));
    });
    chDisplayName = _('е…ЁйғЁз« зҜҖеҢҜзёҪ');
  } else {
    words = gradeData.wordsByChapter[ch] || [];
    chDisplayName = convertText(ch);
  }

  const convertedWords = words.map(w => convertText(w));
  wordInput.value = convertedWords.join('\n');

  if (infoEl) {
    infoEl.textContent = `е·Іијүе…Ҙ [${convertText(grade)} - ${chDisplayName}] е…ұ ${words.length} й …и©һеҸҘ`;
  }
}

function toS(text) {
  return [...text].map(c => T2S[c] || c).join('');
}

function convertText(text) { return isSimp() ? toS(text) : text; }
function isSimp() { return state.lang === 'zh-CN'; }
function isMan()  { return state.lang === 'zh-CN' || state.lang === 'zh-CN-T'; }

function _(s) {
  return isSimp() ? toS(s) : s;
}

function applyUILang() {
  document.querySelectorAll('[data-t]').forEach(el => {
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') return;
    el.textContent = _(el.dataset.t);
  });
  const pl = document.getElementById('wordInput');
  if (pl && pl.dataset.t) pl.placeholder = _(pl.dataset.t);
}

// ====== UTILITIES ======
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ====== MODAL ======
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

function showModal(title, msg) {
  document.getElementById('modalOkBtn').style.display = 'inline-flex';
  document.getElementById('modalConfirmActions').style.display = 'none';
  document.getElementById('modalInput').style.display = 'none';
  document.getElementById('modalTitle').textContent = _(title);
  document.getElementById('modalMsg').textContent = _(msg);
  document.getElementById('modalOverlay').classList.add('open');
}

function showConfirmModal(msg, onConfirm) {
  document.getElementById('modalOkBtn').style.display = 'none';
  document.getElementById('modalInput').style.display = 'none';
  document.getElementById('modalTitle').textContent = '';
  document.getElementById('modalMsg').textContent = _(msg);
  const actions = document.getElementById('modalConfirmActions');
  actions.style.display = 'flex';
  actions.innerHTML =
    `<button class="btn btn-outline" id="modalNoBtn">${_('еҸ–ж¶Ҳ')}</button>` +
    `<button class="btn btn-primary" id="modalYesBtn">${_('зўәе®ҡ')}</button>`;
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modalYesBtn').onclick = () => { closeModal(); onConfirm(); };
  document.getElementById('modalNoBtn').onclick = closeModal;
}

function showPromptModal(msg, defaultValue, onSubmit) {
  document.getElementById('modalOkBtn').style.display = 'none';
  document.getElementById('modalConfirmActions').style.display = 'none';
  document.getElementById('modalTitle').textContent = '';
  document.getElementById('modalMsg').textContent = _(msg);
  const input = document.getElementById('modalInput');
  input.style.display = 'block';
  input.value = defaultValue || '';
  input.onkeydown = e => { if (e.key === 'Enter') { closeModal(); onSubmit(input.value); } };
  const actions = document.getElementById('modalConfirmActions');
  actions.style.display = 'flex';
  actions.innerHTML =
    `<button class="btn btn-outline" id="modalPromptCancelBtn">${_('еҸ–ж¶Ҳ')}</button>` +
    `<button class="btn btn-primary" id="modalPromptOkBtn">${_('зўәе®ҡ')}</button>`;
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modalPromptOkBtn').onclick = () => { closeModal(); onSubmit(input.value); };
  document.getElementById('modalPromptCancelBtn').onclick = closeModal;
  setTimeout(() => input.focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// ====== LANGUAGE TOGGLE ======
function setLanguage(lang) {
  if (lang === state.lang) return;
  state.lang = lang;
  document.querySelectorAll('.lang-opt').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  const ta = document.getElementById('wordInput');
  if (ta && ta.value) ta.value = convertText(ta.value);
  applyUILang();
  
  const curGrade = document.getElementById('gradeSelect') ? document.getElementById('gradeSelect').value : '';
  renderGradeSelect();
  if (curGrade) {
    document.getElementById('gradeSelect').value = curGrade;
    onGradeSelected();
  }
}

function isCJK(c) { return c >= '\u4e00' && c <= '\u9fff'; }
const CJK_PUNCT = new Set('гҖӮпјҢпјҒпјҹгҖҒпјӣпјҡгҖҢгҖҚгҖҺгҖҸгҖҗгҖ‘гҖҠгҖӢвҖ”вҖҰВ·гғ»,.:;!?()пјҲпјү""\'\'');
function stripNonChinese(s) {
  return [...s].filter(c => isCJK(c) || CJK_PUNCT.has(c)).join('');
}
function onlyChinese(s) {
  return [...s].filter(c => isCJK(c) || CJK_PUNCT.has(c)).join('');
}

function updateShuffleBtn() {
  const btn = document.getElementById('shuffleToggle');
  if (!btn) return;
  if (state.shuffle) {
    btn.style.background = '#667eea';
    btn.style.borderColor = '#667eea';
    btn.style.color = '#fff';
  } else {
    btn.style.background = 'transparent';
    btn.style.borderColor = '#cbd5e0';
    btn.style.color = '#4a5568';
  }
}

function toggleShuffle() {
  state.shuffle = !state.shuffle;
  updateShuffleBtn();
}

  }
  const rawItems = text.split(/[гҖӮпјҢпјҒпјҹгҖҒпјӣпјҡгҖҢгҖҚгҖҺгҖҸгҖҗгҖ‘гҖҠгҖӢвҖ”вҖҰВ·гғ»,.:;!?()пјҲпјү""\'\'\n\r\t ]+/);
  const items = rawItems.map(s => s.trim()).filter(Boolean);
  if (items.length === 0) {
    showModal(_('жё…е–®зӮәз©ә'), _('и«Ӣијёе…ҘиҰҒй»ҳеҜ«зҡ„и©һиӘһжҲ–еҸҘеӯҗгҖӮ'));
    return;
  }

  const mapped = items.map((t, i) => {
    t = stripNonChinese(t);
    return {
      text: t,
      index: i,
    };
  }).filter(it => it.text.length > 0);

  if (state.shuffle) shuffle(mapped);
  state.session = {
    items: mapped,
    currentIndex: 0,
  };

  state.canvasStates = [];
  document.getElementById('flipCard').classList.remove('flipped');
  showScreen('screen-dictation');
  showItem(0);
}

// ====== DICTATION ITEM ======
function showItem(index) {
  const session = state.session;
  if (!session || index >= session.items.length) {
    showResults();
    return;
  }

  stopTestTimer();
  document.getElementById('dictTimer').style.display = 'none';

  const item = session.items[index];
  session.currentIndex = index;
  document.getElementById('dictProgress').textContent = `${index + 1} / ${session.items.length}`;

  document.getElementById('flipCard').classList.remove('flipped');
  document.getElementById('flipFrontChar').textContent = item.text;
  const isLong = item.text.length >= 5;
  document.getElementById('flipFrontHint').textContent = isLong ? _('еҸҘеӯҗ') : _('и©һиӘһ');
  document.getElementById('flipCard').scrollIntoView({ block: 'start', behavior: 'smooth' });

  buildCanvasGrid(item.text, document.getElementById('flipCanvasGrid'));
}

function flipCard() {
  document.getElementById('flipCard').classList.add('flipped');
  const item = state.session.items[state.session.currentIndex];
  if (item) {
    startTestTimer(item.text);
    speakCurrent();
  }
}

// ====== TTS ======
let _ttsAudio = null;

function speakCurrent() {
  const session = state.session;
  if (!session || !session.items.length) return;
  const text = session.items[session.currentIndex].text;
  if (!text) return;

  if (_ttsAudio) { try { _ttsAudio.pause(); } catch(e) {} _ttsAudio = null; }

  const mandarin = isMan();
  const dbg = document.getElementById('ttsDebug');

  const tl = mandarin ? 'zh-CN' : 'yue';
  const label = mandarin ? 'жҷ®йҖҡи©ұзҷјйҹі' : 'зІөиӘһзҷјйҹі';
  const cleaned = onlyChinese(text);
  if (!cleaned) { if (dbg) dbg.textContent = 'з„Ўдёӯж–Үеӯ—еҸҜжң—и®Җ'; return; }
  const ttsText = mandarin ? toS(cleaned) : cleaned;
  const audio = new Audio();
  audio.referrerPolicy = 'no-referrer';
  audio.src = 'https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=' + tl + '&q=' + encodeURIComponent(ttsText) + '&client=gtx';
  _ttsAudio = audio;
  audio.onended = () => { _ttsAudio = null; };
  audio.play().then(() => {
    if (dbg) { dbg.textContent = label; setTimeout(() => { dbg.textContent = ''; }, 3000); }
  }).catch(() => {
    if (dbg) dbg.textContent = 'иӘһйҹіж’ӯж”ҫеҸ—йҷҗ';
  });
}

// ====== BUILD CANVAS GRID ======
function buildCanvasGrid(text, gridEl) {
  const chars = [...text];
  gridEl.innerHTML = '';
  state.canvasStates = [];

  const isLong = chars.length >= 5;
  gridEl.style.maxWidth = isLong ? '900px' : '100%';

  chars.forEach((char, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'tianzige-wrap';
    wrap.dataset.index = i;

    const canvas = document.createElement('canvas');
    canvas.className = 'tianzige-canvas';
    canvas.dataset.index = i;
    canvas.width = CANVAS_SIZE;
    canvas.height = CANVAS_SIZE;

    wrap.appendChild(canvas);
    gridEl.appendChild(wrap);

    const cs = {
      canvas,
      ctx: canvas.getContext('2d'),
      strokes: [],
      currentStroke: null,
      isDrawing: false,
      char,
      submitted: false,
    };
    state.canvasStates.push(cs);
    drawTianZiGe(cs.ctx, CANVAS_SIZE, CANVAS_SIZE);
    bindCanvasEvents(cs, canvas);
  });
}

// ====== CANVAS DRAWING ======
function drawTianZiGe(ctx, w, h) {
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, w, h);

  ctx.strokeStyle = '#d0d0e0';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([]);
  ctx.strokeRect(2, 2, w - 4, h - 4);

  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(w / 2, 2);
  ctx.lineTo(w / 2, h - 2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(2, h / 2);
  ctx.lineTo(w - 2, h / 2);
  ctx.stroke();

  ctx.setLineDash([2, 6]);
  ctx.strokeStyle = '#e0e0f0';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(2, 2);
  ctx.lineTo(w - 2, h - 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(w - 2, 2);
  ctx.lineTo(2, h - 2);
  ctx.stroke();
  ctx.setLineDash([]);
}

function redrawCanvas(cs) {
  const { ctx, canvas, strokes } = cs;
  const size = canvas.width;
  drawTianZiGe(ctx, size, size);

  ctx.strokeStyle = '#333';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  strokes.forEach(points => {
    if (points.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length - 1; i++) {
      const xc = (points[i].x + points[i + 1].x) / 2;
      const yc = (points[i].y + points[i + 1].y) / 2;
      ctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
    }
    ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
    ctx.stroke();
  });
}

function bindCanvasEvents(cs, canvas) {
  const getPos = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
    const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return { x: x * scaleX, y: y * scaleY };
  };

  const startDraw = (e) => {
    if (cs.submitted) return;
    e.preventDefault();
    const pos = getPos(e);
    cs.isDrawing = true;
    cs.currentStroke = [pos];
    cs.strokes.push(cs.currentStroke);
  };

  const moveDraw = (e) => {
    if (!cs.isDrawing || cs.submitted) return;
    e.preventDefault();
    const pos = getPos(e);
    cs.currentStroke.push(pos);
    redrawCanvas(cs);
  };

  const endDraw = () => {
    if (!cs.isDrawing) return;
    cs.isDrawing = false;
    cs.currentStroke = null;
  };

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', moveDraw);
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('mouseleave', endDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', moveDraw, { passive: false });
  canvas.addEventListener('touchend', endDraw, { passive: false });
}

function clearAllCanvas() {
  state.canvasStates.forEach(cs => {
    cs.strokes = [];
    cs.currentStroke = null;
    cs.submitted = false;
    cs.canvas.style.opacity = '1';
    redrawCanvas(cs);
  });
}

function undoLastStroke() {
  for (let i = state.canvasStates.length - 1; i >= 0; i--) {
    const cs = state.canvasStates[i];
    if (cs.strokes.length > 0) {
      cs.strokes.pop();
      redrawCanvas(cs);
      return;
    }
  }
}

// ====== TIMER ======
function startTestTimer(text) {
  stopTestTimer();
  const timePerChar = Math.max(TEST_TIME_PER_CHAR_MS, 10000);
  const totalTime = Math.max(text.length * timePerChar, TEST_MIN_TIME_MS);
  state.testTimeLeft = Math.ceil(totalTime / 1000);

  const timerEl = document.getElementById('dictTimer');
  timerEl.style.display = 'block';
  timerEl.classList.remove('timer-critical');
  updateTimerDisplay();

  state.testTimer = setInterval(() => {
    state.testTimeLeft--;
    updateTimerDisplay();
    if (state.testTimeLeft <= 5) timerEl.classList.add('timer-critical');
    if (state.testTimeLeft <= 0) {
      clearInterval(state.testTimer);
      state.testTimer = null;
      nextItem();
    }
  }, 1000);
}

function stopTestTimer() {
  if (state.testTimer) {
    clearInterval(state.testTimer);
    state.testTimer = null;
  }
}

function updateTimerDisplay() {
  const m = Math.floor(state.testTimeLeft / 60);
  const s = state.testTimeLeft % 60;
  document.getElementById('dictTimer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
}

// ====== NEXT ITEM ======
function nextItem() {
  const session = state.session;
  if (!session) return;

  state.canvasStates.forEach(cs => { cs.submitted = true; });

  const item = session.items[session.currentIndex];
  item.canvasImages = state.canvasStates.map(cs => cs.canvas.toDataURL());

  stopTestTimer();
  cleanupHW();

  state.canvasStates.forEach(cs => {
    cs.submitted = false;
    cs.strokes = [];
    cs.currentStroke = null;
  });

  const nextIndex = session.currentIndex + 1;
  if (nextIndex >= session.items.length) {
    showResults();
  } else {
    document.getElementById('flipCard').classList.remove('flipped');
    showItem(nextIndex);
  }
}

// ====== STROKE ORDER ======
function showStrokeOrder(el, char, idx) {
  const existing = document.getElementById('hwPopup');
  if (existing) { closeHWPopup(); return; }

  const popup = document.createElement('div');
  popup.id = 'hwPopup';
  popup.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:18px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.25);z-index:2000;text-align:center';

  popup.innerHTML = `<div style="font-size:.95em;color:#4a5568;margin-bottom:12px;font-weight:700">${escHtml(char)} ${_('зӯҶй ҶеӢ•з•«')}</div>
    <div id="hwCell" style="width:140px;height:140px;margin:0 auto"></div>
    <button class="btn btn-sm btn-outline" onclick="closeHWPopup()" style="margin-top:16px;padding:6px 24px">${_('й—ңй–ү')}</button>
    <div style="margin-top:12px;font-size:.75em;color:#a0aec0">${_('зӯҶй Ҷж №ж“ҡж•ҷиӮІеұҖеӯёзҝ’еӯ—и©һиЎЁжҢҮеј•')}</div>`;

  document.body.appendChild(popup);

  if (typeof HanziWriter !== 'undefined') {
    try {
      const writer = HanziWriter.create('hwCell', char, {
        width: 140, height: 140, padding: 8,
        strokeColor: '#2d3748', radicalColor: '#e74c3c',
        showCharacter: false, strokeAnimationDuration: 400,
        delayBetweenStrokes: 120,
      });
      if (!window._hwInstances) window._hwInstances = [];
      window._hwInstances[idx] = writer;
      setTimeout(() => writer.animateCharacter().catch(() => {}), 300);
    } catch(e) {
      document.getElementById('hwCell').textContent = char;
    }
  }

  popup.addEventListener('click', e => { if (e.target === popup) closeHWPopup(); });
}

function closeHWPopup() {
  if (window._hwInstances) {
    window._hwInstances.forEach(w => { try { w && w.quit && w.quit(); } catch(e) {} });
    window._hwInstances = [];
  }
  const popup = document.getElementById('hwPopup');
  if (popup) popup.remove();
}

function cleanupHW() {
  closeHWPopup();
}

// ====== RESULTS ======
function showResults() {
  stopTestTimer();
  showScreen('screen-results');

  const session = state.session;
  const total = session.items.length;

  document.getElementById('resultScoreNum').textContent = `${total} ${_('й …')}`;
  document.getElementById('resultScoreLabel').textContent = `${_('жё¬й©—е®ҢжҲҗ')}`;

  const detail = document.getElementById('resultDetail');
  detail.innerHTML = `<div style="margin-bottom:10px;color:#718096;font-size:.95em;font-weight:700">${_('жүҖжңүй …зӣ®зёҪиҰҪпјҡ')}</div>` +
    session.items.map((item, i) => {
      const chars = [...item.text];
      const images = item.canvasImages || [];
      let canvasRow = '';
      if (images.length) {
        canvasRow = `<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0 0">`;
        chars.forEach((ch, j) => {
          const img = images[j];
          if (img) {
            canvasRow += `<div style="text-align:center;width:72px">
              <img src="${img}" style="width:68px;height:68px;border-radius:8px;border:1px solid #cbd5e0;background:#fff;display:block">
              <div style="font-size:.9em;font-weight:700;margin-top:4px;color:#2d3748">${escHtml(ch)}</div>
              <button class="btn btn-outline btn-sm" style="margin-top:4px;font-size:.72em;padding:3px 8px;border-width:1px" onclick="showStrokeOrder(this, '${escHtml(ch)}', ${i*100+j})">${_('зӯҶй Ҷ')}</button>
            </div>`;
          }
        });
        canvasRow += `</div>`;
      }
      return `<div class="result-item" style="background:#f8f9fe;flex-direction:column;align-items:stretch;padding:14px">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="result-icon">${i + 1}</span>
          <span class="result-text">${escHtml(item.text)}</span>
        </div>
        ${canvasRow}
      </div>`;
    }).join('');

  state.session = null;
}

function goSetup() {
  stopTestTimer();
  state.canvasStates = [];
  showScreen('screen-setup');
}

function endDictation() {
  showConfirmModal(_('зўәе®ҡзөҗжқҹжё¬й©—пјҹ'), () => {
    stopTestTimer();
    state.session = null;
    state.canvasStates = [];
    goSetup();
  });
}

// ====== DICTIONARY POPUP ======
document.getElementById('dictModalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('dictModalOverlay')) closeDictModal();
});

function showCharDict(char) {
  if (!char) return;
  const data = CHAR_DATA[char];
  const isCN = isMan();
  const content = document.getElementById('dictModalContent');

  if (!data) {
    content.innerHTML = `<div style="text-align:center;padding:24px">
      <div style="font-size:3.2em;font-weight:700;margin-bottom:12px;color:#2d3748">${escHtml(char)}</div>
      <div style="color:#718096">${_('жҡ«з„Ўи©ізҙ°иіҮж–ҷ')}</div>
      <div style="margin-top:16px;color:#a0aec0;font-size:.82em">${_('иҝ”еӣһй Ғйқўй»һж“ҠгҖҢзӯҶй ҶгҖҚжҹҘзңӢзӯҶй ҶеӢ•з•«')}</div>
    </div>`;
  } else {
    const pron = isCN ? data.p : (data.j || data.p);
    const pronLabel = isCN ? 'жҷ®йҖҡи©ұжӢјйҹі' : 'зІөиӘһжӢјйҹі';
    content.innerHTML = `
      <div class="dict-header">
        <div class="dict-char">${escHtml(char)}</div>
        <div class="dict-pron">
          <div><span class="label">${pronLabel}</span> ${pron}</div>
          ${isCN && data.j ? `<div><span class="label">зІөиӘһжӢјйҹі</span> ${data.j}</div>` : ''}
          ${!isCN && data.p ? `<div><span class="label">жҷ®йҖҡи©ұжӢјйҹі</span> ${data.p}</div>` : ''}
        </div>
      </div>
      <div class="dict-info">
        <div class="dict-info-item">
          <div class="val">${data.s || '?'}</div>
          <div class="lbl">${_('зӯҶз•«')}</div>
        </div>
        <div class="dict-info-item">
          <div class="val">${data.r || '?'}</div>
          <div class="lbl">${_('йғЁйҰ–')}</div>
        </div>
      </div>
      <div style="text-align:center;margin-top:16px;color:#a0aec0;font-size:.82em">${_('иҝ”еӣһй Ғйқўй»һж“ҠгҖҢзӯҶй ҶгҖҚжҹҘзңӢзӯҶй ҶеӢ•з•«')}</div>`;
  }
  document.getElementById('dictModalOverlay').classList.add('open');
}

function closeDictModal() {
  document.getElementById('dictModalOverlay').classList.remove('open');
}

// ====== INIT ======
function init() {
  applyUILang();
  const sheetId = getSpreadsheetIdFromUrl();
  discoverAndLoadSheet(sheetId);

  updateShuffleBtn();

  document.getElementById('wordInput').addEventListener('input', function() {
    if (!isSimp()) return;
    const start = this.selectionStart;
    const end = this.selectionEnd;
    const converted = toS(this.value);
    if (converted !== this.value) {
      this.value = converted;
      this.setSelectionRange(start, end);
    }
  });

  if ('speechSynthesis' in window) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = function(){ window.speechSynthesis.getVoices(); };
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
